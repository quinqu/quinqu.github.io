<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luminous Cells</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=La+Belle+Aurore&display=swap" rel="stylesheet">
    <link href="styles.css" rel="stylesheet">
    <style>
      * {
        font-family: 'Inter', sans-serif;
      }

      h1 {
        font-family: 'La Belle Aurore', cursive !important;
      }
    </style>
</head>
<body class="bg-black text-white min-h-screen font-['Inter']">
    <div class="container mx-auto px-4 py-16">
        <!-- Hero Section -->
        <div class="text-center mb-20">
            <h1 class="text-6xl font-bold mb-4 font-['La_Belle_Aurore']">Luminous Cells</h1>
            <p class="text-xl text-gray-400 mb-8">San Francisco, CA</p>
        </div>

        <!-- Hero Image -->
        <div class="max-w-md mx-auto mb-20">
            <img src="./centerpiece.jpg" alt="Luminous Cells" class="rounded-lg shadow-2xl w-full">
        </div>

        <!-- Music Links -->
        <div class="max-w-2xl mx-auto">
            <div class="space-y-4">
                <a href="https://soundcloud.com/softttt" 
                   class="custom-button soundcloud-button">
                    Listen on SoundCloud
                </a>
                <a href="https://open.spotify.com/artist/2mau55UyzWAYJkT5fN1tKU" 
                   class="custom-button spotify-button">
                    Stream on Spotify
                </a>
            </div>
        </div>

        <!-- Rest of the content remains the same -->
        <div class="mt-20 text-center">
            <h2 class="text-2xl font-bold mb-4">Contact</h2>
            <p class="text-gray-400">For inquiries: hello@luminouscells.com</p>
        </div>

        <div class="mt-20 max-w-2xl mx-auto">
            <iframe style="border-radius:12px" 
                    src="https://open.spotify.com/embed/artist/2mau55UyzWAYJkT5fN1tKU" 
                    width="100%" 
                    height="352" 
                    frameBorder="0" 
                    allowfullscreen="" 
                    allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" 
                    loading="lazy">
            </iframe>
        </div>
    </div>
</body>
</html>
